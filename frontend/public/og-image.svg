<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f13"/>
      <stop offset="100%" style="stop-color:#1a1730"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle purple glow behind lock (mirrors the auth-glow on the login page) -->
  <radialGradient id="glow" cx="50%" cy="37%" r="25%">
    <stop offset="0%" stop-color="#6366f1" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Lock icon — centered at (600, 230): translate = (600 - 12*8.33, 230 - 14.5*8.33) -->
  <g transform="translate(500, 109) scale(8.33)">
    <rect x="3" y="11" width="18" height="11" rx="3" fill="#7c6cf8" opacity="0.2"/>
    <rect x="3" y="11" width="18" height="11" rx="3" stroke="#7c6cf8" stroke-width="1.5"/>
    <path d="M7 11V7a5 5 0 0110 0v4" stroke="#7c6cf8" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="12" cy="16.5" r="1.5" fill="#7c6cf8"/>
  </g>

  <!-- App name -->
  <text x="600" y="440" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="56" font-weight="700" fill="white" text-anchor="middle" letter-spacing="-1">SecureChat</text>

  <!-- Tagline -->
  <text x="600" y="496" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="26" font-weight="400" fill="#9b93fa" text-anchor="middle">End-to-end encrypted messaging</text>
</svg>
