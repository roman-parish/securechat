<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f13"/>
      <stop offset="100%" style="stop-color:#1a1730"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle glow behind lock -->
  <ellipse cx="600" cy="295" rx="220" ry="180" fill="#7c6cf8" opacity="0.12"/>

  <!-- Lock icon — centered, scaled up from 32px viewBox to ~160px -->
  <g transform="translate(470, 155) scale(5)">
    <rect x="6" y="14" width="20" height="14" rx="3" fill="#7c6cf8"/>
    <path d="M10 14V10a6 6 0 0 1 12 0v4" stroke="#7c6cf8" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <circle cx="16" cy="20.5" r="2" fill="white"/>
  </g>

  <!-- App name -->
  <text x="600" y="478" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="52" font-weight="700" fill="white" text-anchor="middle" letter-spacing="-1">SecureChat</text>

  <!-- Tagline -->
  <text x="600" y="532" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="400" fill="#9b93fa" text-anchor="middle" letter-spacing="0.5">End-to-end encrypted messaging</text>
</svg>
